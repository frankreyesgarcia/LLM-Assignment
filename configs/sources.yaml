      text: 'La Coordinadora 25S presenta #20D luto y la manifestación convocada para
        el 20 de diciembre

        La movilización tiene por objeto mostrar la indignación de la ciudadanía con
        los Presupuestos Generales del Estado para 2013, que presumiblemente se aprobarán
        definitivamente ese mismo día en el Congreso.

        Han recordado a los medios presentes, que entregaron un texto el pasado 19
        de octubre en el registro del Congreso manifestando su firme oposición al
        proyecto de PGE2013. Consideran que en este tiempo no se ha tenido en cuenta
        las razones que en el mismo se exponían y que “el proceso de aprobación de
        los presupuestos ha sido una pantomima”, calificando el contenido final de
        los mismos como “los presupuestos de la deuda y la miseria”.

        Se pretende que la manifestación sea una solemne marcha fúnebre y silenciosa
        por “la expropiación de los derechos de la ciudadanía”. Saldrá desde la plaza
        de España a las 19:00 horas para finalizar con una concentración en la plaza
        de Neptuno. En ese lugar está previsto la lectura de un comunicado y un minuto
        de silencio “por la muerte de los derechos sociales”.

        Se ha destacado la voluntad de seguir con el proceso de lucha que se viene
        llevando a cabo en los últimos meses, así como aunar y apoyar a todas las
        movilizaciones en defensa de lo público y social. Al tiempo que se impulsa
        la apertura de un Proceso Constituyente, con la coincidencia y el apoyo de
        colectivos y personas individuales, para crear un “poder soberano ciudadano”,
        ya que a juicio de la Coordinadora 25S “los políticos no tienen legitimidad”.

        Ha cerrado la rueda de prensa un representante de los colectivos sanitarios
        que ha denunciado el proceso de privatización en marcha en la sanidad pública
        madrileña, al tiempo que ha realizado un llamamiento a la ciudadanía para
        que acuda a las próximas movilizaciones convocadas en el mes de diciembre.

        Gabinete de Prensa Confederal de CGT

        19-12-2012'
