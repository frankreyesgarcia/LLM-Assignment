    - text: 'चीन में एक समय चोरों का बड़ा आतंक था. राज्य की राजधानी में ची युंग नामक
        एक व्यक्ति था जो किसी भी व्यक्ति का चेहरा देखकर यह बता देता था कि वह व्यक्ति
        चोर है या नहीं. सामनेवाले व्यक्ति के मुखमंडल के कुछ लक्षणों और उसके मन में
        चल रहे भावों को पढने में उसे महारत हासिल थी. उसका यह कौशल देखकर वहां के राजा
        ने उसे राज्य के नागरिकों के निरीक्षण में लगा दिया. ची युंग ने हजारों नागरिकों
        को देखा और उनमें से चोरों की पहचान कर ली. ची युंग ने चोरों को ढूंढ निकाला
        और राज्य में सर्वत्र खुशहाली छा गई.

        राजा ने लाओ-त्ज़ु से ची युंग की बड़ी तारीफ की और कहा – “ची युंग ने अकेले ही
        राज्य को चोरों-डाकुओं से रिक्त कर दिया है. मेरे राज्य में अब हर तरफ शांति
        है. ची युंग के कारण मुझे न्याय-व्यवस्था पर कुछ भी खर्च नहीं करना पड़ता.”

        लाओ-त्ज़ु ने कहा – “यदि आप जैसे शासक ऐसे व्यक्तियों को न्याय-व्यवस्था की कमान
        सौंप देंगे तो आपका राज्य चोरों और डाकुओं से कभी भी मुक्त नहीं हो पायेगा. इसके
        अतिरिक्त, ची युंग के इस तथाकथित गुण के कारण वह एक दिन घोर संकट में पड़ जायेगा.
        उसके प्राण भी जा सकते हैं.”

        उसी समय राज्य में कहीं दूर चोरों और डाकुओं का एक दल ची युंग के विरुद्ध षड़यंत्र
        कर रहा था. उन्होंने उसे अपने मार्ग से हटाने की योजना बना ली. एक दिन उन्होंने
        ची युंग का अपहरण कर लिया और उसे मौत के घाट उतार दिया.

        राजा ने जब यह सुना तो वह अत्यंत भयभीत हो गया. वह दौड़ा-दौड़ा लाओ-त्ज़ु के
        पास गया और उससे बोला – “आपकी आशंका सत्य सिद्ध हो गई. ची युंग की हत्या हो गई
        है. अब मेरे राज्य की सुरक्षा खतरे में है.”

        लाओ-त्ज़ु ने कहा – “एक पुरानी कहावत है, ‘अथाह समुद्र के तल में मछली पकड़ने
        वाले और गुप्त रहस्यों को व्यर्थ ही ढूँढने वाले अपने विनाश को निमंत्रण देते
        हैं’. यदि आप चोरों और डाकुओं से मुक्ति पाना चाहते हैं तो प्रशासन में सज्जन
        व्यक्तियों की नियुक्ति करें. उन्हें निर्देश दें कि वे अपने से ऊपर वालों को
        मार्गदर्शन दें और अपने से नीचे वालों को शिक्षित करें. जब लोग विधि और नियमों
        का पालन करने लगेंगे तो आपके राज्य में चोरों-डाकुओं के बनने का मार्ग स्वतः
        बंद हो जायेगा.”

        राजा ने लाओ-त्ज़ु के बताये अनुसार प्रशासन में सुधार किये और धीरे-धीरे उसका
        राज्य आदर्श राज्य बन गया.'
