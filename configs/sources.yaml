      text: 'CoronaTracker के बारे में

        CORONATRACKER.com एक समुदाय-आधारित परियोजना है, जो दुनिया भर में 460 से अधिक
        स्वयंसेवकों द्वारा संचालित है।यह data scientist, चिकित्सा पेशेवरों, UI/UX
        डिजाइनरों, फुलस्टैक डेवलपर्स से लेकर आम जनता जैसे लोगो से निर्मित हे

        यह जनता के लिए एक पोर्टल के रूप में कार्य करता है जो COVID-19 के बारे में
        नवीनतम समाचार विकास का ट्रैक रखता है, साथ ही आगे के विश्लेषण के लिए डेटा एकत्र
        करता है। सभी सामग्रियों को स्वयंसेवकों द्वारा चुना, फ़िल्टर्ड और क्यूरेट किया
        गया है ताकि जनता के सर्वोत्तम लाभ में यह सुनिश्चित किया जा सके कि स्रोत न्यूनतम
        होक्स और नकली समाचारों के साथ विश्वसनीय हैं। प्राकृतिक भाषा प्रसंस्करण (Natural
        Language Processing) का उपयोग ट्रेंडिंग सामग्री का विश्लेषण करने और हमारी
        टीम द्वारा सत्यापित किए जाने से पहले विभिन्न समाचार स्रोतों और सोशल मीडिया
        प्लेटफार्मों पर सार्थक विषयों की पहचान करने के लिए किया जाता है।

        CORONATRACKER.com का उद्देश्य इन-डेप्थ एनालिसिस (उदाहरण के लिए विकास, वायरस
        के प्रसार की निगरानी के लिए समय श्रृंखला) और स्थानीयकृत समाचार (जैसे केवल
        मलेशिया, या कुआला लुम्पुर से संबंधित समाचार) के लिए डेटा इकट्ठा करना है। यह
        प्लेटफॉर्म सूचना समेकन के लिए महत्वपूर्ण है। और सभी एकत्रित जानकारी जनता के
        लिए उपयोग करने के लिए खुली है। यह एक 100% ओपन सोर्स परियोजना है, सभी जानकारी
        और प्रकाशन योग्य डेटा GitHub पर भी उपलब्ध हैं। हमारे टेलीग्राम चैनल के माध्यम
        से योगदान देने के लिए सभी का स्वागत है

        डेटा साइंटिस्ट की हमारी टीम OSEMN फ्रेमवर्क का उपयोग अपने स्वयं के विश्लेषण
        को इकट्ठा करने, साफ करने, तलाशने, मॉडल बनाने और चलाने के लिए करती है। सार्वजनिक
        समझ में आसानी के लिए, इसे ग्राफिक विज़ुअलाइज़ेशन और डैशबोर्ड का उपयोग करके
        प्रस्तुत किया गया है। प्राप्त आंकड़ों के माध्यम से, हम बहुत जल्द मशीन लर्निंग
        मॉडल बनाने की उम्मीद करते हैं

        हम जॉन हॉपकिंस विश्वविद्यालय द्वारा कोरोनावायरस प्रकोप मानचित्र से प्रेरित
        थे जो बहुत जानकारीपूर्ण था। हमने विभिन्न समाचार पोर्टलों के साथ-साथ विभिन्न
        भाषाओं में बिखरे हुए डेटा के अन्य स्रोतों के माध्यम से गहराई से विश्लेषण के
        लिए डेटा इकट्ठा करने में कठिनाई को भी पहचाना

        चंद्र नववर्ष के पहले दिन 25 जनवरी को काम शुरू हुआ। हमारी टीम इसे सफल बनाने
        के लिए अथक प्रयास कर रही है, और 27 जनवरी को आधिकारिक रूप से लॉन्च किया गयाहमारा
        लक्ष्य प्रौद्योगिकी का उपयोग करना और सूचना को अधिक सुलभ बनाना, दुनिया भर के
        प्रतिभाशाली लोगों को लड़ाई जीतने के लिए इकट्ठा करना है

        स्रोत

        - CoronaTracker

        Binti Hamzah'
