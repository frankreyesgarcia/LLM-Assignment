    samples:
    - text: 'MANTÉM vivo o sonho

        Na qualidade de um dos melhores jogadores da atualidade na seleção uruguaia,
        Alvaro Pereira foi o convidado de honra do programa “Retrato Hablado”, do
        Canal 10 do seu país.

        Entre muitas considerações sobre a seleção que representa, o lateral-esquerdo,
        de 26 anos, também falou um pouco da sua vida, tendo até perspetivado o futuro,
        mas sem garantir que ele passa pelo Dragão

        in "record.pt"'
      id: <urn:uuid:2c650c7c-4777-47cc-a877-0427242aa0ac>
      dump: CC-MAIN-2013-20
      url: http://fcportonoticias-dodragao.blogspot.com/2012_06_16_archive.html
      date: '2013-05-19T16:27:11Z'
      file_path: s3://commoncrawl/crawl-data/CC-MAIN-2013-20/segments/1368697772439/warc/CC-MAIN-20130516094932-00070-ip-10-60-113-184.ec2.internal.warc.gz
      language: por
      language_score: 0.9969878196716309
      language_script: Latn
      minhash_cluster_size: 2
      top_langs: '{}'
      ptpt_score: 0.9947401881217957
      educational_score: 0
      category: Sports
    - text: 'Antes de ser compreendido, antes de procurar arduamente, na esperança
        de encontrar alguém que me compreenda, antes fazer um esforço, por vezes hercúleo,
        para que os outros me compreendam, devo procurar conhecer-me.

        Se compreender porque e para que preciso que outros me compreendam, se genuinamente
        me der ao trabalho de os conhecer, há o forte risco de deixar de sentir essa
        necessidade.

        Tenho a sensação de que é um trabalho sem fim.'
      id: <urn:uuid:2530f0f9-b53e-45df-b47f-a54eb68e7552>
      dump: CC-MAIN-2013-20
      url: http://joaosevilhano.com/blog?tag=compreens%C3%A3o
      date: '2013-05-19T16:45:20Z'
      file_path: s3://commoncrawl/crawl-data/CC-MAIN-2013-20/segments/1368697772439/warc/CC-MAIN-20130516094932-00070-ip-10-60-113-184.ec2.internal.warc.gz
      language: por
      language_score: 0.9930369257926941
      language_script: Latn
      minhash_cluster_size: 37
      top_langs: '{}'
      ptpt_score: 0.8308411240577698
      educational_score: 2
      category: Society
    - text: 'Terça-feira, 19 de Abril de 2011

        Terça-feira, 12 de Abril de 2011

        Mais uma encomenda especial terminada.

        Na semana passada estive literalmente a trabalhar para gatos. Foram-me pedidas
        identificações para os felinos e eu respondi com uma coleira especial e respectiva
        chapa, com o nome do bicho e telefone da dona. Foi mais uma ideia que surgiu
        a partir destes colares.

        As peças foram feitas de raíz: no iníco eram só fitas e chapas de metal. Foi
        recortada a fivela e a chapa, esmaltadas estas partes com as cores pedidas
        e a embalagem escolhida para fazer a combinação máxima. Rocócó puro. Afivela
        deu luta e a culpa foi do mercado, não encontrei nenhuma que ficasse perfeita
        e por isso resolvi fazer.

        Todas as imagens do conjunto podem ser vistasaqui.

        Neste momento as peças estão em fase de teste nos respectivos donos para ver
        o que será necessário afinar. Depois de tudo testado irão com certeza para
        a loja nesta opção black and white e noutras também. Estou desejosa.'
      id: <urn:uuid:38da5a94-e691-472b-b301-b15eeb1051ea>
      dump: CC-MAIN-2013-20
      url: http://margapinta.blogspot.com/2011_04_01_archive.html
