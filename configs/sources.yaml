    - text: 'कोयला ''घोटाला'' : सीएजी ने दी पीएम को सफाई

        नई दिल्ली. 2 जी स्पेक्ट्रम घोटाले के बाद केंद्र सरकार कोयला खदानों के आवंटन
        को लेकर घिर गई दिखती है। एक अंग्रेजी अखबार में छपी खबर में सीएजी की ड्राफ्ट
        रिपोर्ट के हवाले से बताया गया है कि कोयला खदानों की बिना नीलामी ''पहले आओ
        पहले पाओ'' के आधार पर आवंटन किए जाने से सरकारी खजाने को 10.67 लाख करोड़ रुपये
        का ''चूना'' लगा है। बताया जा रहा है कि यह 2 जी से 6 गुना बड़ा घोटाला है, जिसमें
        करीब 100 निजी कंपनियों को फायदा पहुंचाया गया है। ड्राफ्ट रिपोर्ट में कहा गया
        है कि 155 कोयला खदानों का आवंटन बिना नीलामी के किया गया। 2 जी स्पेक्ट्रम घोटाले
        में 1.76 लाख करोड़ रुपये का सरकारी खजाने का नुकसान पहुंचाने का आरोप लगा है।

        इस बीच, सीएजी ने पीएमओ को चिट्ठी लिखकर सफाई दी है। सीएजी के मुताबिक ‘कोयला
        मंत्रालय की रिपोर्ट पर मीडिया में आई खबर गुमराह करने वाली है। नुकसान का सही
        आकलन नहीं है क्योंकि रिपोर्ट अभी तैयार की जा रही है। ये फाइनल ड्राफ्ट से भी
        पहले का दस्तावेज है।’ पीएमओ ने यह जानकारी देते हुए प्रेस रिलीज भी जारी किया
        है।

        हालांकि सीएजी की इस ड्राफ्ट रिपोर्ट ने राजनैतिक रूप ले लिया है। बीजेपी, लेफ्ट
        और समाजवादी पार्टी ने लोकसभा में आज कार्यवाही शुरू होते ही इस मुद्दे पर हंगामा
        कर दिया। इसके बाद सदन की कार्यवाही दोपहर 12 बजे तक के लिए स्थगित कर दी गई।
        राज्यसभा में भी इस मुद्दे पर हंगामा हुआ, जिसके बाद सदन की कार्यवाही 12 बजे
        तक के लिए स्थगित कर दी गई। बीजेपी और समाजवादी पार्टी ने आज प्रश्नकाल स्थगित
        कर इस मुद्दे पर चर्चा कराने की मांग की है। पार्टी ने मांग की है कि प्रधानमंत्री
        खुद संसद में इस मुद्दे पर सफाई दें।

        गौरतलब है कि सीएजी की ड्राफ्ट रिपोर्ट में कहा गया है कि सरकारी खजाने को यह
        नुकसान 2004-09 के बीच हुआ। इस दौरान शिबू सोरेन कोयला मंत्री थे। हालांकि, कुछ
        समय के लिए यह मंत्रालय धानमंत्री के पास भी था। बीजेपी ने इसी को आधार बनाकर
        प्रधानमंत्री का इस्तीफा मांगा है। पार्टी के प्रवक्ता प्रकाश जावड़ेकर ने संसद
        में प्रश्नकाल स्थगित करने के लिए नोटिस देने के बाद मीडिया से बात करते हुए
        कहा है कि अब केंद्र सरकार को सत्ता में बने रहने का कोई नैतिक अधिकार नहीं रह
        गया है। वहीं, लेफ्ट के नेता सीताराम येचुरी ने भी कहा कि हम लोगों ने कोयला
        खदानों की नीलामी करने की मांग की थी, लेकिन सरकार ने उस पर अमल नहीं किया। समाजवादी
        पार्टी ने कहा है कि जो लोग भी घोटाले में शामिल हैं, वे खुद इस्तीफा दे दें।

        संसद में हंगामे के बाद कांग्रेस ''डैमेज कंट्रोल'' करने में जुट गई है। मीडिया
        में आ रही खबरों के मुताबिक यूपीए अध्यक्ष सोनिया गांधी ने सपा नेता रेवती रमण
        सिंह से बात की है। वर्तमान में कोयला मंत्री श्रीप्रकाश जयसवाल ने यह कहते हुए
        इस खबर पर टिप्पणी करने से मना कर दिया कि जब आधिकारिक तौर पर रिपोर्ट उनके सामने
        आएगी तो ही वे प्रतिक्रिया देंगे। जायसवाल ने कहा, ''मैं मीडिया में आ रही रिपोर्ट
        के आधार पर टिप्पणी नहीं कर सकता हूं। अगर हमें सीएजी रिपोर्ट मिलेगी तो हम उसका
        विश्लेषण कर कार्रवाई करेंगे। मैं सिर्फ यूपीए 2 में ही कोयला मंत्री रहा हूं
        और इस दौरान कोयला खदान का आवंटन किसी को भी नहीं किया गया है।''

        कांग्रेस के नेता राजीव शुक्ला ने कहा है कि कोई घोटाला नहीं हुआ है। उन्होंने
        सरकार का बचाव करते हुए कहा है कि ड्राफ्ट रिपोर्ट संसद में नहीं रखी जाती है।
        शुक्ला ने कहा है कि नीलामी होती तो बोझ जनता पर पड़ता। गौरतलब है कि वहीं, कांग्रेस
        के प्रवक्ता शकील अहमद ने यह कहते हुए सरकार का बचाव करने की कोशिश की है कि
        यह कोई घोटाला नहीं है, बल्कि इसमें सिर्फ घाटा हो सकता है। गौरतलब है कि सीएजी
        ने अभी इस मामले में ड्राफ्ट रिपोर्ट ही तैयार की है। सीएजी को इस बाबत अंतिम
        रिपोर्ट अभी तैयार करना बाकी है।

        सेकेंड, स्लीपर और एसी थ्री के किराए में बढ़ोतरी वापस

        रेल मंत्री की संसद में हुई ''रैगिंग''

        वीडियो: अब गुजरात विधानसभा में भी ''डर्टी पिक्चर''!

        आज दिल्ली में होगा येदियुरप्पा पर फैसला'
