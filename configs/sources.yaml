    - text: 'En fín, Cruz ….. Porque después de muchas negociaciones maritales, mi
        panadero, como yo le llamo, ha terminado convenciéndome de que no es buen
        momento para comprar la thermomix, y era algo de lo que yo tenía muchas ganas;
        así es la vida, toca esperar.

        Y Cara ….. porque como casi todo en la vida, tiene un lado bueno; mi panadero
        para intentar subirme el ánimo, hasta que pueda comprarme la maquinita, pues
        me ha regalado una panificadora.

        Hace unos días, Cris en su blog “Kanela y Limón”, uno de los mejores blogs
        de cocina que he visitado en mi vida, publicaba que ponían a la venta en Lidl
        la panificadora Bifinett; y Alberto decidió comprármela.

        Me la regaló el mismo sábado que se ponía a la venta, pero no pude abrirla
        y verla en todo el día, pues comíamos en casa de mis suegros. Se me hizo un
        día muy largo, porque moría de ganas de llegar a casa y abrirla, jejejeje.
        En cuanto llegamos a casa, ya de noche, casi no me dio tiempo de soltar el
        bolso y ya estaba abriendo la caja. Seguí las instrucciones de “antes del
        primer uso” y así quedó.

        El Domingo, con los ojos aún medio cerrados y cambio de hora incluído, me
        fui corriendo a la cocina, busqué la primera receta de la que tuviera los
        ingredientes, los pesé, y a la cubeta. Pan en el programa 2 “Esponjoso”.

        A las 2 en punto salía de mi nueva panificadora un hermoso pan cuadrado!!!
        No daba crédito a lo que veía. Lo saqué de la cubeta, lo puse en una bandeja
        y se lo llevé a mi suegra (que repetíamos comiendo alli). Menos mal, que se
        me ocurrió hacerle una foto antes de irme, porque no quedó ni la muestra del
        corte. Sencillamente buenísimo!!! Tan bueno, que mi suegra, que ya tiene una
        panificadora Princess, el lunes a primera hora fue al Lidl y se compró una
        como la mía.

        Un besazo a todas y todos!!'
