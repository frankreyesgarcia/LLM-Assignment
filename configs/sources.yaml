    - text: 'Autor de nombre científico

        En nomenclatura, el autor del nombre científico es la persona o equipo que
        ha descrito, denominado y publicado válidamente un taxón. La cita del autor
        es la referencia al autor o autores del taxón y se escribe luego del nombre
        científico del mismo.[1]

        El modo en que se realiza la cita del autor de un determinado nombre científico
        varía según se trate de taxones de plantas, animales o bacterias y se encuentra
        normalizado, respectivamente, por el Código Internacional de Nomenclatura
        Botánica, el Código Internacional de Nomenclatura Zoológica y el Código Internacional
        de Nomenclatura de Bacterias. De hecho, en el caso de los taxones de plantas,
        la cita del autor se realiza en forma generalmente abreviada,[2] mientras
        que en los casos de los taxones de animales y de bacterias se utiliza el apellido
        completo del autor.[3] [4] A continuación se detallan las normas y recomendaciones
        para citar al autor o autores de taxones de plantas, animales y bacterias.

        1 Reglas y recomendaciones

        1.1 Taxones de plantas

        1.1.1 Abreviatura del autor

        1.2 Taxones de animales

        1.3 Taxones de bacterias

        Reglas y recomendaciones[editar]

        Taxones de plantas[editar]

        Las reglas y recomendaciones para citar al autor o autores de un taxón de
        plantas están establecidas en el artículo 46 del Código Internacional de Nomenclatura
        Botánica, las cuales se resumen a continuación:[5]

        En las publicaciones, particularmente aquellas referidas a taxonomía y nomenclatura,
        es deseable citar a los autores del nombre del taxón, aún cuando no se realice
        una referencia bibliográfica.[6] Ejemplos:

        Rosaceae Juss., Rosa L., Rosa gallica L., Rosa gallica var. eriostyla R.Keller,
        Rosa gallica L. var. gallica.

        Puede observarse que la cita del autor se realiza tanto para la familia (Rosaceae),
        como para el género (Rosa), la especie (Rosa gallica) o la variedad (Rosa
        gallica var. eriostyla). El autor para el nombre de la familia es Antoine-Laurent
        de Jussieu, para el nombre del género y de la especie es Carlos Linneo y para
        la variedad es Robert Keller. Todos esos nombres han sido convenientemente
        abreviados según se indica en la próxima sección.

        Aún en las revistas científicas, el nombre del autor de un taxón se cita solo
        la primera vez que se menciona a dicho taxón. Ejemplo:[7]

        El género Vicia L. está representado por ca. 180 ­a 210 especies, distribuidas
        en todas las regiones tropicales y templadas del mundo. El mayor centro de
        variación de especies de Vicia se halla en el área Mediterránea, con centros
        secundarios en América del Norte y América del Sur.

        El nombre de un nuevo taxón debe atribuirse al autor o autores que realizaron
        la descripción válida o diagnosis de ese taxón, aunque la publicación de la
        diagnosis haya sido realizada por otros autores.[8]

        Olive Mary Hilliard y Brian Laurence Burtt publicaron en 1986 un trabajo en
        el que los nombres y descripciones de varias especies de Schoenoxiphium, incluyendo
        a Schoenoxiphium altum, se atribuían a Ilkka Kukkonen[9] El nombre del taxón,
        entonces, se cita como S. altum Kukkonen.[10]

        John Torrey y Asa Gray en su obra de 1838[11] atribuyeron los nombres Calyptridium
        y C. monandrum a «Nutt». Las descripciones estaban entre comillas indicando
        que Thomas Nuttall las había escrito, como se reconocía y agradecía en el
        prólogo. Los nombres, entonces, se citan como Calyptridium Nutt. y C. monandrum
        Nutt.[12]

        Cuando el nombre de un taxón se publica conjuntamente por dos autores, ambos
        deben citarse uniendo sus nombres con la palabra «et» o el símbolo «&».[13]

        Devia xeromorpha Goldblatt et J.C.Manning (o Goldblatt & J.C.Manning) es el
        nombre de un taxón que fue descrito y publicado conjuntamente por los taxónomos
        Peter Goldblatt y'
