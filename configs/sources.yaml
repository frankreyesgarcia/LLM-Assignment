    - text: 'Onda triangular

        La onda triangular es un tipo de señal periódica que presenta unas velocidades
        de subida y bajada (Slew Rate) constantes. Lo más habitual es que sea simétrica,
        es decir que, los tiempos de subida y bajada son iguales.

        1 Propiedades

        2 Aplicaciones

        Propiedades[editar]

        La onda triangular tiene un contenido en armónicos muy bajo, lo que concuerda
        con su parecido a una onda senoidal. Tanto matemática como físicamente se
        puede obtener integrando en el tiempo una onda cuadrada: los niveles constantes
        alto y bajo de dicha onda se convierten en las pendientes (constantes) de
        los flancos de subida y bajada de la onda triangular.

        Aplicaciones[editar]

        Las ondas triangulares tienen aplicaciones destacadas, tales como:

        Generación de señales sinusoidales. Se generan ondas sinusoidales conformando
        la señal triangular con redes de resistencias y diodos. Es el método habitual
        para producir sinusoides en los generadores de funciones de baja frecuencia
        (hasta unos 10 MHz).

        Generación de barridos. En los tubos de rayos catódicos, se aplican tensiones
        triangulares asimétricas (diente de sierra) a las placas deflectoras, en el
        caso de osciloscopios, o corrientes de la misma forma a las bobinas deflectoras,
        en el caso de monitores de televisión, pantallas de ordenador, etc.

        Osciladores. Como la relación entre el tiempo y la amplitud de una onda triangular
        es lineal, resulta conveniente para realizar osciladores controlados por tensión,
        comparando su nivel con la tensión de control.

        GENERADOR DE ONDA TRIANGULAR El siguiente circuito es un generador de onda
        triangular, está formado por una etapa (A1) donde hay un amplificador con
        realimentación positiva y una segunda etapa (A2) donde tenemos un circuito
        integrador.

        Ilustración 1. Circuito Onda Triangular

        Ilustración 2. Onda Triangular

        Control Proporcional

        La parte proporcional consiste en el producto entre la señal de error y la
        constante proporcional como para que hagan que el error en estado estacionario
        sea casi nulo, pero en la mayoría de los casos, estos valores solo serán óptimos
        en una determinada porción del rango total de control, siendo distintos los
        valores óptimos para cada porción del rango. Sin embargo, existe también un
        valor límite en la constante proporcional a partir del cual, en algunos casos,
        el sistema alcanza valores superiores a los deseados. Este fenómeno se llama
        sobre oscilación y, por razones de seguridad, no debe sobrepasar el 30%, aunque
        es conveniente que la parte proporcional ni siquiera produzca sobre oscilación.
        Hay una relación lineal continua entre el valor de la variable controlada
        y la posición del elemento final de control (la válvula se mueve al mismo
        valor por unidad de desviación). La parte proporcional no considera el tiempo,
