    - text: '1. गैसों के गुण

        सबसे पहले, हम जानते हैं कि एक गैस की कोई निश्चित मात्रा या आकार नहीं है; एक
        गैस जो कुछ भी उपलब्ध है उसे भर देगी। एक तरल के व्यवहार के विपरीत, जिसकी हमेशा
        एक अलग ऊपरी सतह होती है, जब इसकी मात्रा उस स्थान से कम होती है, जहां यह रहता
        है।

        गैसों और ठोस पदार्थों की तुलना में गैसों की अन्य उत्कृष्ट विशेषता उनकी कम
        घनत्व है। गैसों की सबसे उल्लेखनीय संपत्ति, हालांकि, यह है कि एक बहुत अच्छा
        सन्निकटन के लिए, वे सभी तापमान और दबाव में परिवर्तन के जवाब में उसी तरह का
        व्यवहार करते हैं, जो अनुमानित मात्रा द्वारा विस्तार या अनुबंध करते हैं। यह
        तरल पदार्थ या ठोस के व्यवहार से बहुत अलग है, जिसमें प्रत्येक विशेष पदार्थ
        के गुणों को व्यक्तिगत रूप से निर्धारित किया जाना चाहिए।

        सभी गैसों का समान तापमान अंतर के कारण समान रूप से समान रूप से विस्तार होता
        है।

        गैसों का प्रसार: वह घटना जिसमें कोई पदार्थ आणविक गति के कारण दूसरे के साथ
        घुलमिल जाता है, यहाँ तक कि गुरुत्वाकर्षण के विरुद्ध भी - विसरण कहा जाता है।

        गैस का दबाव: गैस के अणु, निरंतर गति में होने के कारण, अक्सर उनके कंटेनर की
        आंतरिक दीवारों पर प्रहार करते हैं। जैसा कि वे ऐसा करते हैं, वे तुरंत गतिज
        ऊर्जा के नुकसान के बिना उछलते हैं, लेकिन दिशा के उलट (त्वरण) कंटेनर की दीवारों
        पर एक बल लगाते हैं। कुल बल क्षेत्र, जिस पर वह कार्य करता है, द्वारा विभाजित
        यह बल गैस का दबाव है।

        SI प्रणाली में दबाव की इकाई पास्कल (पा) है, जिसे एक न्यूटन प्रति वर्ग मीटर
        (1 Nm –2 = 1 kg m- 1 s –2 ) के बल के रूप में परिभाषित किया गया है ।

        तापमान और तापमान स्केल: तापमान को औसत ताप के माप के रूप में परिभाषित किया
        जाता है। तापमान कणों की संख्या या वस्तु के आकार और आकार से स्वतंत्र है। पानी
        के उबलने का तापमान सभी प्रकार के कंटेनरों के लिए समान है।

        थर्मामीटर: वह उपकरण जिसका उपयोग किसी वस्तु के तापमान को मापने के लिए किया
        जाता है।

        तापमान पैमाने: एक संदर्भ पैमाने जिसके संबंध में तापमान को मापा जा सकता है,
        ''तापमान के पैमाने'' के रूप में जाना जाता है। तापमान के विभिन्न पैमाने उपयोग
        में हैं। तापमान के महत्वपूर्ण पैमाने हैं:

        i। सेल्सियस पैमाने

        ii। केल्विन स्केल

        iii। फारेनहाइट पैमाने

        तापमान के पैमाने को विकसित करने के लिए, निश्चित संदर्भ बिंदुओं (तापमान) की
        आवश्यकता होती है, जिसके संबंध में अन्य सभी तापमानों को मापा जाता है। तापमान
        के सेल्सियस और फ़ारेनहाइट स्केल दोनों के लिए, निर्धारित बिंदु निम्नानुसार
        हैं:

        (i) निचला निश्चित बिंदु: सामान्य वायुमंडलीय दबाव में शुद्ध बर्फ के पिघलने
        बिंदु को निचले निश्चित बिंदु के रूप में माना जाता है।

        (ii) ऊपरी निश्चित बिंदु: सामान्य वायुमंडलीय दबाव में शुद्ध जल के क्वथनांक
        को निम्न निश्चित बिंदु के रूप में माना जाता है।

        सेल्सियस पैमाने: इस पैमाने में सबसे कम निश्चित बिंदु शुद्ध पदार्थ का ठंड तापमान
        होता है। ऊपरी निश्चित बिंदु पानी का क्वथनांक है। अंतराल को 100 डिवीजनों में
        विभाजित किया गया है, सभी समान दूरी पर हैं। हर विभाजन को एक डिग्री सेल्सियस
        (.C) के रूप में निरूपित किया जाता है। सेल्सियस पैमाने को सेंटीग्रेड स्केल
        भी कहा जाता है क्योंकि तापमान की सीमा को 100 बराबर विभाजनों में विभाजित किया
        जाता है।

        केल्विन स्केल: एक अन्य प्रकार का स्केल जिसका उपयोग तापमान के मापन को परिभाषित
        करने के लिए किया जाता है वह है केल्विन स्केल। केल्विन पैमाने को तापमान के
        निरपेक्ष पैमाने के रूप में भी जाना जाता है। सबसे कम निश्चित बिंदु को सबसे
        कम तापमान से लिया जाता है, जिसे ठंडा किया जा सकता है जैसे -273.15ºC। पैमाने
        के अनुसार, एक तापमान को केवल K से दर्शाया जाता है।

        निरपेक्ष शून्य: जिस तापमान पर गैस का एक द्रव्यमान द्रव्यमान किसी मात्रा में
        नहीं होता है या दबाव नहीं डालता है उसे "शून्य शून्य" कहा जाता है। निरपेक्ष
        शून्य अर्थात, 0K या -273 theC सबसे कम संभव तापमान है जिस तक पहुंचा जा सकता
        है। इस तापमान पर गैस में शून्य का सैद्धांतिक आयतन होता है। केल्विन पैमाने
        में, सबसे कम संभव तापमान शून्य के रूप में लिया जाता है। इस तापमान को पूर्ण
        शून्य कहा जाता है। बिंदु निरपेक्ष शून्य पर कोई आणविक गति नहीं होती है और न
        ही कोई ऊष्मा ऊर्जा होती है। पूर्ण शून्य पर सभी परमाणु और आणविक गतियां बंद
        हो जाती हैं। इसलिए पूर्ण शून्य सबसे कम संभव तापमान है जिसे 0K या -273.15 zero
        C से दर्शाया जाता है।

        तापमान का फ़ारेनहाइट स्केल: इस पैमाने में निचले और ऊपरी तय बिंदुओं को क्रमशः
        320 एफ और 2120 एफ माना जाता है। 1800 एफ के अंतराल को 180 बराबर भागों में विभाजित
        किया गया है। प्रत्येक भाग को 10 एफ के रूप में जाना जाता है। यह डॉक्टरों द्वारा
        व्यापक रूप से उपयोग किया जाता है।

        गैस का आयतन बस वह स्थान होता है जिसमें गैस के अणु गति करने के लिए स्वतंत्र
        होते हैं। अगर हमारे पास गैसों का मिश्रण है, जैसे कि हवा, तो विभिन्न गैसें
        समान मात्रा के भीतर सह-अस्तित्व में होंगी। इन मामलों में, गैसें तरल पदार्थ
        और ठोस पदार्थों से बहुत अलग हैं, पदार्थ के दो संघनित अवस्थाएं। मात्रा की SI
        इकाई घन मीटर है, लेकिन रसायन विज्ञान में हम आमतौर पर लीटर और मिलीलीटर (मिलीलीटर)
        का उपयोग करते हैं। क्यूबिक सेंटीमीटर (सीसी) भी अक्सर उपयोग किया जाता है; यह
        1 मिलीलीटर (एमएल) के बहुत करीब है।

        संपीड़न: एक गैस के कण उनके बीच बड़े अंतर-आणविक स्थान होते हैं। दबाव के आवेदन
        से इस स्थान को कम किया जा सकता है और कणों को करीब लाया जा सकता है। इसलिए गैस
        का आयतन बहुत कम किया जा सकता है। इसे गैस को कंप्रेस करना कहते हैं।

        2. गैस कानून

        सभी गैसें, अपनी रासायनिक संरचना के बावजूद, कुछ कानूनों का पालन करती हैं, जो
        गैसों की मात्रा, तापमान और दबाव के बीच संबंध को नियंत्रित करती हैं। तापमान
        और दबाव की निश्चित स्थितियों के तहत गैस का एक द्रव्यमान, एक निश्चित मात्रा
        में होता है। जब तीनों में से कोई भी परिवर्तन किया जाता है, तो अन्य चर बदल
        जाते हैं। इस प्रकार ये गैस कानून गैस के आयतन, दबाव और तापमान के तीन प्रकारों
        के बीच संबंध स्थापित करते हैं।

        बॉयल का नियम: रॉबर्ट बॉयल (1627 - 1691) ने 1662 में इस कानून की खोज की और
        इसका नाम उसके नाम पर रखा गया। इसे "स्थिर गैस पर स्थिर द्रव्यमान के द्रव्यमान
        के आयतन और दबाव का गुणनफल" के रूप में पुनर्स्थापित किया जा सकता है। P "1 /
        V (निरंतर तापमान पर) या PXV = K (जहां K स्थिर है)।

        चार्ल्स लॉ: "निरंतर दबाव में, गैस के दिए गए द्रव्यमान का आयतन, प्रत्येक डिग्री
        सेंटीग्रेड वृद्धि या तापमान में कमी के लिए, 32o F पर इसके मूल आयतन का 1/273
        बढ़ता है या घटता है।" मान लीजिए कि गैस के दिए गए द्रव्यमान में एक स्थिर दबाव
        पर तापमान T1 केल्विन में V1 की मात्रा होती है, तो, चार्ल्स के कानून के अनुसार
        हम लिख सकते हैं: V "T या VT = K (लगातार)।

        दबाव कानून: स्थिर शेष मात्रा, गैस के दिए गए द्रव्यमान का दबाव बढ़ जाता है
        या प्रत्येक डिग्री सेल्सियस के तापमान में वृद्धि या गिरावट के लिए 00C पर इसके
        दबाव के एक निरंतर अंश (= 1/273) से कम हो जाता है। यदि 0 pressureC पर गैस के
        दिए गए द्रव्यमान का दबाव पीओ हो; तब T0C के तापमान में वृद्धि या गिरावट के
        लिए, इसका दबाव Pt = Pt = Po {1 ± (t / 273)} द्वारा दिया जाता है। • एवोगैड्रो
        का नियम: यह काफी सहज है: निश्चित गैस द्वारा सीमित गैस का आयतन सीधे बदलता रहता
        है। गैस की मात्रा के साथ। समान तापमान और दबाव पर मापी गई गैसों के बराबर मात्रा
        में, समान संख्या में अणु होते हैं। एवोगैड्रो का नियम इस प्रकार गैस के मोल्स
        की संख्या और इसकी मात्रा के बीच सीधे आनुपातिक संबंध की भविष्यवाणी करता है।

        गे-लुसाक का नियम: जब विभिन्न गैसें एक दूसरे के साथ रासायनिक रूप से गैसीय पदार्थों
        का उत्पादन करने के लिए प्रतिक्रिया करती हैं, तो तापमान और दबाव की इसी स्थिति
        के तहत, प्रतिक्रियाशील गैसों और उत्पाद गैसों की मात्रा एक दूसरे के बीच एक
        साधारण राशन सहन करती है।

        एवोगैड्रो की परिकल्पना: दबाव और तापमान की समान स्थिति के तहत, सभी गैसों के
        बराबर मात्रा में समान संख्या में अणु होते हैं।

        किसी तत्व या यौगिक का आणविक भार परमाणुओं के परमाणु भार का योग है जो पदार्थ
        के एक अणु का गठन करता है। उदाहरण: नाइट्रिक एसिड का आणविक सूत्र सूत्र HNO 3
        है ; इसलिए इसका आणविक भार = H + N + 3 × O = 1 + 14 + 3 × 16 = 63 (हाइड्रोजन
        का परमाणु भार 1 के रूप में लेना)।

        ग्राम-परमाणु भार: किसी भी पदार्थ की मात्रा जिसका ग्राम में द्रव्यमान उसके
        परमाणु भार के बराबर होता है, उसे ग्राम-परमाणु भार कहा जाता है। • ग्राम-आणविक
        भार: किसी भी पदार्थ की एक मात्रा जिसका द्रव्यमान ग्राम में आणविक भार के बराबर
        होता है, उसे ग्राम-आणविक भार या मोल कहा जाता है।

        किसी भी गैस के एक मोल द्वारा कब्जा की गई आणविक मात्रा को ग्राम-आणविक मात्रा
        या मोलर मात्रा कहा जाता है। एवोगैड्रो की परिकल्पना के आधार पर, सामान्य तापमान
        पर किसी भी गैस की ग्राम आणविक मात्रा और दबाव 22.4 लीटर है।

        एवोगैड्रो संख्या: एवोगैड्रो की परिकल्पना से, हम जानते हैं कि सभी गैसों की
        समान मात्रा में सामान्य तापमान और दबाव पर समान अणु होते हैं। हम यह भी जानते
        हैं कि सामान्य तापमान और दबाव में किसी भी गैस का एक मोल 22.4 लीटर होता है।
        दोनों को मिलाकर, हम कह सकते हैं कि, सभी गैसों के ग्राम आणविक मात्रा में सामान्य
        तापमान और दबाव पर समान अणु होते हैं। यह संख्या Avogadro नंबर के रूप में जानी
        जाती है और 6.06X10 23 के बराबर है ।

        गैस समीकरण: बॉयल के नियम के अनुसार, गैस का आयतन दबाव, तापमान शेष, अर्थात,
        V "1 / P के विपरीत भिन्न होता है और चार्ल्स के नियम के अनुसार, गैस का आयतन
        सीधे पूर्ण तापमान के रूप में भिन्न होता है, दबाव लगातार बना रहता है, अर्थात
        V "T दोनों, इन कानूनों को संयुक्त किया जा सकता है: गैस के दिए गए द्रव्यमान
        की मात्रा दबाव के साथ और सीधे तापमान के साथ भिन्न होती है। वी "(1 / पी) एक्सटी
        या वी" टी / पी या (पीएक्सवी) / टी = के (निरंतर)। दूसरे शब्दों में, किसी गैस
        के दिए गए द्रव्यमान के लिए, यदि प्रारंभिक शर्तें P1, V1 और T1 हैं, तो परिवर्तित
        स्थितियां P2, V2 और T2 हैं। इस प्रकार, (P1X V1) / T1 = (P2X V2) / T2।

        राज्य का आदर्श गैस समीकरण: यदि चर पी, वी, टी और एन (मोल्स की संख्या) में ज्ञात
        मूल्य हैं, तो एक गैस को एक निश्चित स्थिति में कहा जाता है, जिसका अर्थ है कि
        गैस के अन्य सभी भौतिक गुण भी हैं परिभाषित। इन राज्य चर के बीच संबंध को राज्य
        के समीकरण के रूप में जाना जाता है। बॉयल, चार्ल्स, और एवोगैड्रो के नियमों (आप
        ऐसा करने में सक्षम होना चाहिए!) की अभिव्यक्तियों को जोड़कर हम राज्य के बहुत
        महत्वपूर्ण आदर्श गैस समीकरण लिख सकते हैं: पीवी = एनआरटी, जहां आनुपातिकता निरंतर
        आर को गैस स्थिरांक के रूप में जाना जाता है। । यह कुछ समीकरणों में से एक है
        जो आपको इस पाठ्यक्रम में स्मृति के लिए करना चाहिए; आपको आर के सामान्य मूल्य
        और इकाइयों को भी जानना चाहिए।

        एक आदर्श गैस एक काल्पनिक गैस है जो गैस नियमों का पालन करती है और 0 K पर 0
        की मात्रा होती है, गैस मौजूद नहीं है।

        कुछ संचार तत्व और यौगिक

        1. हाइड्रोजन: प्रतीक एच, सूत्र एच 2। आवर्त सारणी में पहला तत्व और ब्रह्मांड
        में सभी तत्वों का सबसे बुनियादी और सामान्य। ब्रह्मांड के सभी परमाणुओं में
        नब्बे प्रतिशत से अधिक हाइड्रोजन परमाणु हैं और वे सभी तत्वों में सबसे हल्के
        हैं। हाइड्रोजन नाम लैटिन शब्द "हाइड्रो" से आया है जिसका अर्थ है पानी। वैज्ञानिक
        सभी रासायनिक समीकरणों और विवरणों में हाइड्रोजन का प्रतिनिधित्व करने के लिए
        "एच" अक्षर का उपयोग करते हैं।

        हाइड्रोजन परमाणुओं में क्षार धातुओं की तरह एक इलेक्ट्रॉन होता है।

        हाइड्रोजन आम तौर पर क्षार धातुओं की तरह + 1 वैधता दिखाता है।

        हाइड्रोजन अन्य क्षार धातुओं की तरह एक अच्छा कम करने वाला एजेंट है।

        हाइड्रोजन के समस्थानिक: प्रोटियम में एक परमाणु संख्या 1, और द्रव्यमान संख्या
        1, ड्यूटेरियम, एक परमाणु संख्या 1, और द्रव्यमान संख्या 2 और ट्रिटियम में एक
        परमाणु संख्या 1, और द्रव्यमान संख्या 3 है।

        इसका वाष्प घनत्व 1 है, जो हवा की तुलना में 14.4 गुना हल्का है।

        2. कार्बन: आवर्त सारणी में छठा तत्व। यह एक बहुत ही स्थिर तत्व है। क्योंकि
        यह स्थिर है, यह कई प्राकृतिक रूप से पाए जाने वाले यौगिकों में और अपने आप से
        पाया जा सकता है। वैज्ञानिक कार्बन की तीन अवस्थाओं को हीरे, अनाकार और ग्रेफाइट
        के रूप में वर्णित करते हैं।

        कार्बन एलोट्रॉपी को प्रदर्शित करता है और अधिकतम मोचन दिखाता है।

        चार वैलेंस इलेक्ट्रॉनों की उपस्थिति के कारण कार्बन की सामान्य वैधता चार है।
        इस प्रकार सभी चार बांड आम तौर पर सहसंयोजक होते हैं।

        कार्बन मुक्त अवस्था में हीरा, कोयला आदि और संयुक्त रूप में CO 2 के रूप में
        होता है ।

        हीरा कार्बन के अलॉट्रोपिक रूपों में से एक है और प्राकृतिक कार्बन का शुद्धतम
        रूप है। यह सबसे कठोर प्राकृतिक पदार्थ है। हीरा एक विशाल ढाँचा है जो बिजली
        का संचालन करने के लिए मुक्त इलेक्ट्रॉनों के साथ एक कठोर संरचना बनाता है।

        ग्रेफाइट भी कार्बन का एक ऐलोट्रोपिक रूप है, जो बहुत नरम और फिसलन है। ग्रेफाइट
        में क्षैतिज विमानों पर इलेक्ट्रॉनों का एक मोबाइल क्लाउड है, जो इसे बिजली का
        एक अच्छा कंडक्टर बनाता है।

        हीरे और ग्रेफाइट के अलावा, जो कार्बन के क्रिस्टलीय रूप हैं, कार्बन के अन्य
        सभी प्रकार कार्बन के अनाकार आबंटन हैं। कोयले का विनाशकारी आसवन कोयला गैस,
        गैस कार्बन, कोयला टार और अमोनिकल शराब जैसे उत्पाद देता है।

        लैम्प ब्लैक को Soot के नाम से भी जाना जाता है। हवा की सीमित आपूर्ति में, कार्बोनेस,
        ईंधन, विशेष रूप से तेल ईंधन के अधूरे दहन द्वारा सूद प्राप्त किया जाता है।
        कालिख कक्ष के कूलर भागों पर बसती है, और इसे स्क्रैप करके एकत्र किया जा सकता
        है।

        लकड़ी का कोयला लकड़ी के विनाशकारी आसवन द्वारा प्राप्त किया जाता है। बनने वाले
        मुख्य उत्पाद लकड़ी का कोयला, लकड़ी का टार, पाइरोलिग्नियस एसिड और लकड़ी गैस
        हैं।

        गन्ने की चीनी को चीनी के चारकोल से प्राप्त किया जा सकता है, या तो इसे केंद्रित
        सल्फ्यूरिक एसिड के साथ इलाज करके या हवा की अनुपस्थिति में गर्म करके।

        बोन चारकोल एक काला पाउडर है जिसे ''आइवरी ब्लैक'' कहा जाता है। यह छिद्रपूर्ण
        है और रंग को रंग देने का काम कर सकता है। इसका उपयोग ज्यादातर चीनी उद्योग में
        चीनी को सड़ाने के लिए किया जाता है।

        3. नाइट्रोजन: यह कार्बन और ऑक्सीजन के बीच स्थित आवर्त सारणी का सातवाँ तत्व
        है। पृथ्वी का लगभग अस्सी प्रतिशत वायुमंडल नाइट्रोजन गैस से बना है। नाइट्रोजन
        एक स्पष्ट गैस है जिसमें कोई गंध नहीं होती है जब यह अपने शुद्ध रूप में होती
        है। शुद्ध अणु में होने पर यह बहुत प्रतिक्रियाशील नहीं होता है, लेकिन हाइड्रोजन
        (अमोनिया) सहित अन्य तत्वों के साथ मिलाने पर यह बहुत ही प्रतिक्रियाशील यौगिक
        बना सकता है। एक नाइट्रोजन परमाणु में 7 इलेक्ट्रॉन होते हैं।

        इसकी खोल खोल में नाइट्रोजन में 5 इलेक्ट्रॉन हैं। इसमें हाइड्रोजन के संबंध
        में 3 की मान्यता है और ऑक्सीजन के संबंध में 5 तक की वैधता है।

        प्रयोगशाला में नाइट्रोजन को अमोनियम नाइट्राइट और अमोनियम क्लोराइड के मिश्रण
        पर गर्मी की क्रिया द्वारा तैयार किया जाता है। नाइट्रोजन को पानी के नीचे विस्थापन
        द्वारा एकत्र किया जाता है और इसे रासायनिक नाइट्रोजन कहा जाता है।

        नाइट्रोजन एक तटस्थ गैस है और न तो दहनशील है और न ही दहन का समर्थक है।

        4. ऑक्सीजन: प्रतीक O, सूत्र O 2। अकेले, ऑक्सीजन एक बेरंग और गंधहीन यौगिक है
        जो कमरे के तापमान पर एक गैस है। ऑक्सीजन के अणु वातावरण में ऑक्सीजन का एकमात्र
        रूप नहीं हैं; आप ऑक्सीजन को ओजोन और कार्बन डाइऑक्साइड के रूप में भी पाएंगे।
        एक ऑक्सीजन परमाणु में 8 इलेक्ट्रॉन होते हैं। प्रयोगशाला में ऑक्सीजन आमतौर
        पर पोटेशियम क्लोरेट और मैंगनीज डाइऑक्साइड के मिश्रण को गर्म करके प्राप्त किया
        जाता है। मैंगनीज डाइऑक्साइड पोटेशियम क्लोरेट के अपघटन की सुविधा देता है, लेकिन
        यह स्वयं द्रव्यमान और संरचना में अपरिवर्तित रहता है और इसलिए प्रतिक्रिया में
        उत्प्रेरक के रूप में कार्य करता है। ऑक्सीजन न के बराबर है लेकिन दहन का एक
        अच्छा समर्थक है। ऑक्साइड दो तत्वों का एक यौगिक है, जिनमें से एक ऑक्सीजन है।
