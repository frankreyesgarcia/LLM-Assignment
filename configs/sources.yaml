    - text: 'Moléculas del interior de las células que contienen información genética
        y la transmiten de una generación a otra. También se llama ácido desoxirribonucleico.

        Más informaciónADN (Ácido Desoxirribonucleico)

        AmpliarLa mayor parte del ADN se encuentra en el interior del núcleo de una
        célula, donde forma los cromosomas. Los cromosomas contienen proteínas llamadas
        histonas que se unen al ADN. El ADN tiene dos hebras que se enroscan y forman
        una escalera de caracol que se llama hélice. El ADN se compone de cuatro componentes
        básicos que se llaman nucleótidos: adenina (A), timina (T), guanina (G) y
        citosina (C). Los nucleótidos se unen entre sí (A con T y G con C) para formar
        enlaces químicos llamados pares de bases, que conectan las dos cadenas de
        ADN. Los genes son pequeñas piezas de ADN que transportan información genética
        específica. Instituto Nacional del Cáncer'
