      text: 'El galardonado actor estadounidense Philip Seymour Hoffman, ganador de
        un Oscar por su rol en ‘Capote’, fue encontrado muerto este domingo a los
        46 años en su departamento en Nueva York a raíz de una presunta sobredosis
        de drogas, dijo una fuente del Departamento de Policía. Fue encontrado en
        su residencia ubicada en Manhattan después de una llamada de emergencia al
        911 realizada por un amigo.

        El Departamento de Policía de Nueva York ya se encuentra investigando con
        el fin de determinar la causa exacta del deceso.

        Reuters destaca que la causa de la muerte pudo haber sido una sobredosis de
        drogas. Efe recuerda que en el pasado este hombre tuvo problemas de adicción.

        New York Times, citando a una fuente policial, dijo que los investigadores
        encontraron una jeringa en el brazo del actor y un sobre con lo que se cree
        que es heroína.

        Actualmente el actor estaba filmando las siguientes partes de la exitosa saga
        The Hunger Games, donde aparece, en su segunda entrega, interpretando a Plutarch
        Heavensbee, personaje relevante en la historia para las siguientes películas.

        Esperemos que esta trágica noticia no retrase las próximas entregas de esta
        exitosa saga.

        Fuente: http://noticias.univision.com/article/1837883/2014-02-02/gente-en-las-noticias/murio-philip-seymour-hoffmanMuere
        Philip Seymour (Plutarch Heavenbee)

        Recomienda este post a tus amigos.

        Agregar a Favoritos

