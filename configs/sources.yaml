    - text: 'Información general

        El 11 de agosto tuvieron lugar las segundas elecciones celebradas en el país
        desde el final del conflicto, en 2002. En septiembre, en la segunda vuelta,
        Ernest Koroma, candidato del Congreso de Todo el Pueblo, se hizo con el 54,6
        por ciento de los votos, mientras que Solomon Berewa, vicepresidente del país
        y candidato del gobernante Partido Popular de Sierra Leona, obtuvo el 45,4
        por ciento de los votos. Ernest Koroma fue investido presidente el 15 de noviembre.

        Se aplazó el juicio contra Charles Taylor, ex presidente de Liberia, y se
        preveía que se reanudara a principios de 2008. Dos de los tres juicios celebrados
        ante el Tribunal Especial para Sierra Leona se encontraban en fase de apelación,
        tras dictarse sentencia y condena; el tercero seguía en curso. Quedaron en
        libertad tres personas juzgadas por cargos de traición.

        Durante el año, el Fondo de la ONU para la Consolidación de la Paz asignó
        a Sierra Leona 35 millones de dólares estadounidenses, mientras que la Comisión
        de Consolidación de la Paz de la ONU experimentó avances considerables y llegó
        a un acuerdo sobre la identificación de cinco cuestiones prioritarias. Se
        renovó por un año el mandato de la Oficina Integrada de la ONU en Sierra Leona
        (UNIOSIL), entidad encargada de consolidar la paz.

        Sierra Leona seguía siendo uno de los países más pobres del mundo, con una
        esperanza de vida extremadamente baja y elevados índices de analfabetismo.

        El Tribunal Especial para Sierra Leona

        En julio, Alex Tamba Brima, Brima Bazzy Kamara y Santigie Borbor Kanude, miembros
        del Consejo Revolucionario de las Fuerzas Armadas, fueron declarados culpables
        de 11 cargos de crímenes de guerra y crímenes contra la humanidad, entre ellos
        actos de terrorismo, asesinato, violación y esclavitud y reclutamiento de
        personas menores de 15 años para su integración en grupos armados. Todos ellos
        fueron absueltos de tres cargos, incluidos los de esclavitud sexual y matrimonio
        forzado. Alex Brima y Santigie Kanu fueron condenados a 50 años de prisión
        cada uno, y Brima Kamara, a 45 años. Al concluir el año, el caso se encontraba
        en fase de apelación.

        En febrero murió en Senegal, a causa de complicaciones postoperatorias, el
        jefe Hinga Norman, dirigente de la Fuerza de Defensa Civil, contra el que
        se había presentado acta de acusación formal ante el Tribunal Especial para
        Sierra Leona por ocho cargos de crímenes de guerra y crímenes contra la humanidad.

        En agosto, Moinina Fofana y Allieu Kondewa, miembros de la Fuerza de Defensa
        Civil, fueron declarados culpables de cuatro cargos de crímenes de guerra,
        crímenes contra la humanidad y violaciones graves del derecho internacional
        humanitario. En octubre, la sala de primera instancia del Tribunal Especial
        para Sierra Leona los condenó a seis y ocho años de prisión, respectivamente.
        El tribunal justificó la relativa tibieza de las penas con el argumento de
        que sus asesinatos de civiles, muchos de ellos mujeres y menores a quienes
        mataron a machetazos, se habían cometido en pro de una causa «claramente justa
        y defendible»: la restauración de la democracia.

        Durante 2007 se aplazó varias veces el juicio contra Charles Taylor en La
        Haya, cuya reanudación estaba prevista para principios de 2008. Los retrasos
        iniciales se debieron a falta de tiempo de la defensa para preparar el caso.

        En mayo de 2007 empezó la fase de defensa, que previsiblemente se prolongaría
        hasta abril de 2008, en el juicio contra Issa Sesay, Morris Kallon y Augustine
        Gbao, miembros del Frente Revolucionario Unido.

        Liberación de opositores políticos

        El 1 de noviembre quedaron en libertad Omrie Golley, ex portavoz del Frente
        Revolucionario Unido, Mohamed Alpha Bah y David Kai-Tongi, tras más de un
        año de procesamiento judicial por traición, al declarar la Fiscalía General
        que no había causa contra ellos.

        Libertad de prensa

        En enero, la Fiscalía General pidió la extradición de Ahmed Komeh, Bai Bureh
        Komeh y Aminata Komeh, hijos de Fatmata Hassan, diputada del gobernante Partido
        Popular de Sierra Leona. Todos ellos habían huido a Reino Unido tras la muerte
        de Harry Yansaneh, director del periódico independiente For Di People, en
        2005.

        - Philip Neville, editor y director del diario privado Standard Times, fue
        acusado dos veces de «difamación sediciosa», primero en febrero y, más tarde,
        en junio. El segundo incidente guardaba relación con la publicación de un
        artículo sobre la conducta del gobierno. La fianza que se le impuso ascendía
        a 200 millones de leones (68.135 dólares estadounidenses), cantidad que se
        consideró injustificadamente elevada.

        Se produjeron varios actos de intimidación en torno a las elecciones. Al parecer,
        el 29 de junio, Ansu Kaikai, diputado del gobernante Partido Popular de Sierra
        Leona, amenazó con clausurar Radio Wanjei en Pujehun y ordenar detener al
        director de la emisora si éste permitía que miembros del Movimiento Popular
        por el Cambio Democrático que residían fuera del país utilizaran la radio
        para informar a sus simpatizantes sobre los comicios de agosto.

        Actuación policial y sistema de justicia

        En general, la policía mantuvo correctamente el orden público durante el periodo
        electoral. Se produjeron pocos incidentes violentos y, según informes, el
        comportamiento de los agentes se ciñó a las normas internacionales sobre actuación
        policial y derechos humanos.

        Seguía habiendo una grave falta de jueces, magistrados, abogados defensores
        y fiscales con la formación adecuada, lo que se traducía en prolongados retrasos
        de los juicios y en la dilatación de los periodos de detención preventiva,
        que en algunos casos duraban hasta seis años.

        Los centros de detención de Sierra Leona no cumplían las normas internacionales.
        Un informe de la ONU concluyó que las prisiones del país estaban extremadamente
        masificadas. Por ejemplo, en la prisión de Pademba Road, diseñada para albergar
        a 350 reclusos, se hacinaban más de 1.000 personas. Asimismo, el informe reveló
        que había reclusos que llevaban hasta dos años en espera de juicio, y que
        el 90 por ciento de los detenidos entrevistados carecían de representación
        letrada.

        Derechos de las mujeres

        En junio, el Parlamento aprobó una ley sobre los derechos del menor. Sin embargo,
        para que se aprobara, fue necesario eliminar las disposiciones que penalizaban
        la mutilación genital femenina. Aproximadamente, el 94 por ciento de la población
        femenina era víctima de esta práctica.

        También en junio, el Parlamento aprobó tres proyectos de ley sobre la violencia
        intrafamiliar, la sucesión intestada y el registro del matrimonio consuetudinario
        y el divorcio, que se consideraron una victoria para la lucha por el fortalecimiento
        de los derechos de las mujeres en las zonas rurales. Pese a ello, las mujeres
        seguían sufriendo discriminación y violencia generalizadas, situación que
        se veía agravada por la falta de acceso a la justicia.

        Se estableció un grupo especial para la protección de la mujer, dirigido por
        la organización no gubernamental Comité Internacional de Rescate, y con representación
        de la sociedad civil y del gobierno.

        Justicia transicional

        Comisión Nacional de Derechos Humanos

        La Comisión Nacional de Derechos Humanos de Sierra Leona, establecida en diciembre
        de 2006, abrió una oficina, impartió formación y realizó una gira de sensibilización
        por el país.

        Comisión de la Verdad y la Reconciliación

        El 13 y 14 de noviembre se discutió la aplicación de las recomendaciones de
        la Comisión de la Verdad y la Reconciliación en una conferencia organizada
        por la Comisión Nacional de Derechos Humanos de Sierra Leona, a la que asistieron
        representantes de la sociedad civil, de organismos de la ONU y del gobierno.
        La participación del gobierno en la conferencia reflejaba una postura más
        firmemente comprometida con la aplicación exhaustiva de dichas recomendaciones.

        Reparaciones

        La oficina del vicepresidente encomendó la aplicación del programa de reparaciones
        a la Comisión Nacional para la Acción Social. El Grupo Especial sobre Reparaciones
        presentó al gobierno un informe sobre el establecimiento del programa relativo
        al Fondo Especial para Víctimas de Guerra y Reparaciones.

        La membresía de Amnistía Internacional celebró en Makeni una concentración
        masiva para reclamar la concesión de reparaciones. El vicepresidente se comprometió
        públicamente a garantizar justicia y reparaciones plenas para las decenas
        de miles de mujeres sierraleonesas que habían sido víctimas de violencia sexual.

        Pena de muerte

        Pese a los esfuerzos de la sociedad civil por lograr la abolición de la pena
        capital –una de las recomendaciones clave de la Comisión de la Verdad y la
        Reconciliación–, 18 personas seguían condenadas a muerte. De ellas, 11 habían
        sido acusadas de traición, incluidos miembros del ejército de Sierra Leona,
        en activo o retirados. Durante el año, una de ellas murió y dos quedaron en
        libertad, y al concluir el año siete estaban esperando que se resolvieran
        los recursos de apelación que habían interpuesto, mientras que en otro caso
        la condena de muerte se confirmó en apelación. Otras 10 personas fueron condenadas
        por asesinato.

        Informe y visitas de Amnistía Internacional

        - Delegaciones de Amnistía Internacional visitaron el país en marzo, junio
        y noviembre.

        - Sierra Leona: Abusos contra los derechos humanos de las mujeres en el ámbito
        legal informal (AFR 51/002/2006)'
