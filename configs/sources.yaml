      text: 'Pronunciamiento de libertad y justicia, del alma en obras

        Cabalgaba el caballero, gallardo, ledo y alborozado, como ángel ascendido
        para misiones nuevas. Ajeno del todo iba cargado con la negra orden de la
        caballería con que apresuró a quitarse de en medio el ladino ventero, con
        sobrealzado de ánimo de práctica mundana. Las palabras son preformativas:
        inciden y en cierta manera informan a la realidad sobre la que se abren. Su
        carga de bendición o maledicencia, de pensamiento y de acción con carga, llevan
        índole de virtualidad para extenderse. La realidad sobre don Quijote, adelante,
        no dejaría de ser obediente a semejante condición.

        Contrapunto esencial y conflictivo va a ser el juicio de nuestro héroe fuera
        de sentido y de tiempo, empero en el tiempo real de sus actos; y no menos,
        el sentido de libertad en que se resume toda su alma y apuesta de ejecutorias.
        Mío buen señor don Quijote es un alma buena, un esencial libre, una tensión
        presta a mantener por doquier esa cualidad natural e irreprimible. Y no puede
        olvidarse que desde tal condición se despabila un ajustado sentido de la justicia,
        basamento, norma, llave y amparo de ella cuando puesto en relación con el
        todo social y sus individuos.

        Aún con la luz suave del alba, sobre el polvo del Camino Real que al Andalucía
        de Sevilla se enderezaba, cabalgaba sujeto a sus pensamientos fuertes y elevados,
        atento a dar efecto a los consejos recibidos por quien le dispensara los créditos
        que imaginaba haber recibido. No era el caballero un necio, sino un loco,
        un loco de virtud atravesado, que en quietud aprendía conforme de la realidad
        ante sus ojos cuando podía. Vivía en el intento de la purificación y del valimiento,
        más enseguida, la voz de su talante hubo de ponerle en trance de actuación.
        Ante una invitación indeclinada, con sólo encomendarse al cielo, tiró de las
        riendas para encaminar a su montura hacia aquella espesura desde donde percibía
        dolidos ayes y malas voces; era la voz en algarabía del trance a intervenir.
        El designio enloquecido aparentaba traducirse: sin pensar nada se daba ya
        a intervenir.

        Ya nos encontramos ante el sustancioso pasaje que alza, ante el hidalgo por
        caballero, la visión de un joven pastor, Andrés, reducido de libertad porque,
        aunque posible negligente en su función, ya atado a una encina aparecía, por
        alto desajustado en sus derechos porque vapuleado por el látigo y escarnecido
        por la lengua de quien abusaba arriba de su autoridad y posición. Era un manifiesto
        de poder, una clara abolición de la santa libertad. Lo podemos conocer en
        amplio visitando el capítulo cuarto de la obra. Y merece la pena porque estamos
        ante un asunto de universal interés.

        El hidalgo exuda, primariamente, el valor de la libertad, de donde debe desgajarse
        que el entero todo del hombre y del orden social, en sus anchas y ricas derivaciones,
        es un vivo quehacer individual. Nada más ni nada menos, pero con el peso de
        su carga y con el esfuerzo que impone en la riqueza del espíritu. El hidalgo
        nos ha de resumir que ante la propia concepción de la libertad humana, todo,
        incluso la justicia y hasta la autoridad, sobra y cede y que, en ello, nada
        ha de arredrar. Desde luego, es imposible, nunca imaginaría aquello de la
        “obediencia debida”, porque eso no es más que puro desperdicio en mala alma
        de lacayos. La libertad, este sólo termino en su concepto, es el centro y
        resumen de su temeraria condición, la voz a seguir de su imperativo categórico
        en el vértice de toda la pirámide que culmina. En toda la novela ha de florecer,
        a hora y deshora, este sentido. El de hoy, con sus sucesos encadenados y adyacentes,
        supone su temprana aparición en los campos de Montiel.

        Frente a un derecho rudo y obsceno, bárbaro sin duda, el hombre tocado de
        virtud debe actuar presta y rápidamente: no hay peor libertad que la soportada
        sin tino, ni mayor injusticia que su mismísimo mantenimiento, o como poco
        su aplazada intervención y resultado, tal vez que sus mismos enredos casuísticos
        en aquella supuesta ciencia sin conciencia que arma la confusión y el extravío.
        Su ser y adecuada operatividad diligente es un sentimiento sustancial al ser
        del hombre; lo es, además, universal. Quiero entender que muy español siempre,
        no sé si tanto en el presente.

        Debe ser leída esta aventura, y deben acotarse algunas de sus palabras textuales,
        como de seguido realizo. Con ver aquella escena don Quijote, porque le conmueve
        por entero y le rompe la enjundia de su corazón, con celo airado ya recriminaba
        exclamando:

        “-Descortés caballero, mal parece tomaros con quien defender no se puede.”

        Añade el episodio otros aspectos de recado precioso, que no son sino otros
        de los ligados ingredientes que teje la dignidad y ser de la persona humana:
        vemos al hilo del relato uno primero: el respeto a la verdad, la afrenta que
        traslada herir el honor, esa cualidad que a nadie debe ser negada sin estar
        muy bien probada su falta. Ocurre el lance cuando el supuesto caballero hacendado
        afirma desde su alma que castiga el mentir de su empleado. Mentir es una gruesa
        palabra en disparo a quemarropa contra un gran concepto: en todos, como en
        el hidalgo, por la ofensa tan grave que aparejar debería el sólo oírla en
        directo, nos debería llevar a sentir viva vergüenza por sentirnos ofendidos,
        ultrajados. De donde aparece su fulminante reacción:

        “-¿”Miente” delante de mí, ruin villano? Por el sol que nos alumbra, que estoy
        por pasaros de parte a parte con esta lanza. Pagadle luego sin más réplica;
        si no, por el Dios que nos rige, que os concluya y aniquile en este punto.
        Dasatadlo luego.”

        ¡Determinante lección, mi don ejemplar resuelto en tanto! Hermoso es no soportar
        la mentira ante sí cuando especialmente pronunciada sin prueba, mendazmente,
        sobre un inferior en destino. Nunca se ha de paladear bastante tan espectacular
        proceder: habría de ser contemplada sin demasía como veneno en nuestra lengua.
        Quien no deteste este proceder insano y, a cambio, la salude con reverencia,
        pues allá él; pero es odioso su hacer, como inaudito su torticero sobrepasar.
        Torticero, ¿nos damos cuenta?, una feliz palabra rescatada y muy en boga por
        tantos ahora con necesidad plena.

        Ya desatado el muchacho, saca nuestro fiel cuentas de la causa y controversia,
        de cuantos dineros en suma al zagal se le debían, y acaso hasta con la propina
        por añadidura que por error, o felicidad conmutativa, suma nuestro señor Quijote
        en honra y prez, replicando ante una demanda de descuentos por parte del rico
        hacendado, cuanto sigue que es primor recordar:

        “-Bien está todo eso, pero quédense los zapatos y las sangrías por los azotes
        que sin culpa le habéis dado, que, si él rompió el cuero de los zapatos que
        vos le pagastes, vos le habéis rompido el de su cuerpo, y si le sacó el barbero
        sangre estando enfermo, vos en sanidad se la habéis sacado; así que por esta
        parte no os debe nada.”

        En el suceso del juicio y su acción, dado un punto, ya el jovenzuelo en aparente
        salva inmediata no bien asimilada ni creída por cierto -porque con justeza
        poco lo habría de creer en derecho, porque más tuerto que recto suele presentarse,
        dado lo demasiado torcido en que se sustancia con frecuencia a ojos no ciegos-,
        con miras por su cuerpo y alma por la desconfianza, puso en aviso a su valedor
        abogado advirtiendo a cerca del personaje que no era caballero, más sí empero
        Juan Haldudo el rico, vecino de un pueblo cercano. La réplica de nuestro amigo
        hidalgo, inmóvil en su fe, no es más que la otra y anterior interpolación
        anunciada, y, tan típica como suculenta ejemplar:

        “-Importa poco eso, que Haldudos puede haber caballeros; cuanto más que uno
        es hijo de sus obras.”

        ¡Feliz la condición de nuestro soberbio héroe en llano! Bravo hombre colocado
        en la tierra como para predicar lo cabal y esforzado, lo personal con brío
        y resultado! Hermosa réplica, feliz lección, lapidaria por sencilla. ¿Quién,
        si en su seso y con fuerzas precisas en el alma, renegará de esta ajustadísima
        sentencia? ¿Quien se librará de la hondura de su fresco destino a la esperanza
        en espera? Las obras, las obras propias y decentes, no las heredadas por sangre
        o privilegio son las verdaderas, las que trazan buen surco y plantan los cipreses
        que suben al cielo. Por estas cosas sencillas olvidadas, o tan tomadas a beneficio
        de inventario, de olvido, es por lo que todo hombre puede ser grande y recibir
        el homenaje que con buena atribución debiera seguirse, obligadamente, en toda
        alma agradecida y bien nacida.

        Prosigue el acto y auto, poco más adelante del contencioso, recto y rápido,
        sin remilgos, y hallamos que aún más determina: se deshace con galanura de
        los vanos añadidos, de esos sin atado ni precinto:

        “-Del sahumerio os hago gracia: dádselos en reales, que con eso me contento;
        y mirad que lo cumpláis como lo habéis jurado: si no, por el mismo juramento
        os juro de volver a buscaros y a castigaros, y que os tengo de hallar, aunque
        os escondáis más que una lagartija.”

        Presta causa y encausamiento, palabras llanas, inclinación por la libertad,
        por la justicia en el ajuste de su equidad y por aquella condición humana
        que, en la piedad, más mira por el débil que se aguanta ante el poderoso y
        rico. Obra presta y amor claro, justicia de hombre con tino: eso tenemos.
        Sana justicia, sano pronunciamiento de libertad, sin gastos ni derroche.

        Mi gran señor Quijote: sobre libertad, honor, justicia y justificación por
        las obras limpias y buenas, ¡que hermosas lecciones hemos recibido! Atento
        a todo ello fue don Miguel de Cervantes, el del valor del espíritu, pues del
        imposible olvido se sirvió ahora y en eficaz el acto de gallardía.

        Pero el espíritu del mal, la negra tropa del mal, está al avío, al acecho
        de la rapiña. Es la verdad cruda del mundo, la perversa actuación demasiadas
        ocasiones del mundo; es la hipocresía sobre caballo poderoso y bien acicalado.
        No es de dudar que corrido habría de quedar nuestro amigo en buen hidalgo;
        tanto como Haldudo servido en el haber y los resultados de su apellido (falso,
        significa), como el pobre Andrés, pues que en el pico del apaleo, casi del
        crucificado hubo de quedar, como la tradición añade así como en nombre y resultado
        acerca del santo apóstol que su nombre llevaba. La palea endiablada de la
        vida.

        .'
