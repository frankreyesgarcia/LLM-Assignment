    - text: 'बीमारी के चलते प्रैक्टिस से दूर रहे युवराज-रैना

        कोलंबो. टी-20 वर्ल्ड कप में अब तक खराब खेल दिखा रही टीम इंडिया (पढ़ें, ऐसे
        तो जल्द बाहर हो जाएगा भारत) को बड़ा झटका लगा है। टीम के स्टार ऑलराउंडर युवराज
        सिंह और सुरेश रैना ने बीमार होने के कारण पी सारा ओवल मैदान में टीम के साथ
        अभ्यास सत्र में हिस्सा नहीं लिया (पढ़ें, भारत की क्या हो रणनीति) । भारत को
        रविवार को इंग्लैंड से भिडऩा है। टीम सूत्रों का कहना है कि अफगानिस्तान के खिलाफ
        शानदार गेंदबाजी करने वाले युवराज के गले में सूजन है जबकि रैना पेट में गड़बड़ी
        की समस्या से जूझ रहे हैं। दोनों खिलाड़ी टीम के मेडिकल स्टाफ की निगरानी में
        हैं।

        भारतीय टीम ने टीम होटल में उसे दिए जा रहे भोजन की क्वालिटी के बारे में अपनी
        शिकायत दर्ज कराई है। शिकायत में संबंधित एजेंसी को इस मामले को देखने और समस्या
        को दूर करने को कहा गया है।

        इससे पहले साउथ अफ्रीका के पांच खिलाड़ी फूड पॉइजनिंग और वाइरल फीवर के कारण
        बीमार पड़ गए थे। हालांकि, गुरुवार को हुए जिम्बाब्वे के खिलाफ मुकाबले से पहले
        वे फिट हो गए। न्यूजीलैंड के तीन क्रिकेटरों को भी पेट में गड़बड़ी की शिकायत
        हुई थी।

        भारत ने पाकिस्तान के खिलाफ खेले गए अभ्यास मैच और अफगानिस्तान से हुए मुकाबले
        में जो खेल दिखाया है, उसे लेकर टीम को पहले से ही जबरदस्त आलोचना झेलनी पड़
        रही है। वैसे भी टीम के आधे खिलाड़ी 30 साल से ज्यादा के हैं।'
