# Quality/cleaning thresholds (TASK1-PLAN.md, Etapa 4). Loaded into
# src.filters.quality.QualityConfig — tune here, never hardcode in code.

quality:
  min_words: 50
  max_words: 100000
  min_sentences: 3
  max_symbol_word_ratio: 0.1
  max_digit_word_ratio: 0.25
  max_single_word_line_ratio: 0.3
  # Pilot finding (corpus-ptbr-v2, 2026-07-08): the plan's suggested default
  # of 3 drops ~10% of perfectly normal long-form articles that legitimately
  # repeat a topical 4-gram (e.g. "um poste de energia" appears 7x in an
  # article about hitting a utility pole). Raised after inspecting dropped
  # samples; still catches degenerate spam (e.g. "** to ** for ** ** ..."
  # repeated 80x). Revisit per-source during Fase 3 tuning.
  max_ngram_repetitions: 10
  ngram_size: 4
  banned_substrings:
    - "lorem ipsum"
    - "{"
    # NOTE: "javascript" alone is dropped in the plan's default table but is
    # too aggressive (flags legitimate docs about the JS language). Prefer a
    # boilerplate-specific phrase; revisit after the pilot's false-positive review.
    - "enable javascript to continue"
  # Small seed list; expand per-language during the pilot (Fase 1) after
  # reviewing dropped-example samples.
  toxic_words: []

language:
  soft_filter_min_confidence: 0.65

dedup:
  minhash_num_permutations: 128
  minhash_jaccard_threshold: 0.85
